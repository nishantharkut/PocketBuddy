<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" rx="20" fill="#0A0A0A" />
  <defs>
    <linearGradient id="pocketTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF9F43" />
      <stop offset="100%" stop-color="#FF6B00" />
    </linearGradient>
    <linearGradient id="pocketSides" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D97706" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>
    <linearGradient id="pocketBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B00" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="coinGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </linearGradient>
    <filter id="coinShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>
  
  <!-- Origami Pocket Base -->
  <path d="M20 38 L50 56 L20 72 Z" fill="url(#pocketSides)" opacity="0.85" />
  <path d="M80 38 L50 56 L80 72 Z" fill="url(#pocketSides)" opacity="0.7" />
  <path d="M50 56 L80 72 L50 85 L20 72 Z" fill="url(#pocketBottom)" />
  <path d="M50 20 L80 38 H20 Z" fill="url(#pocketTop)" opacity="0.9" />

  <!-- Floating coin -->
  <circle cx="50" cy="52" r="14" fill="url(#coinGrad)" stroke="#FF6B00" stroke-width="1.5" filter="url(#coinShadow)" />
  
  <!-- Standard Rupee symbol inside coin -->
  <path d="M44 47H56" stroke="#0F1219" stroke-width="1.8" stroke-linecap="round" />
  <path d="M44 50H53" stroke="#0F1219" stroke-width="1.8" stroke-linecap="round" />
  <path d="M49 47V53" stroke="#0F1219" stroke-width="1.8" stroke-linecap="round" />
  <path d="M49 47A 3 3 0 0 1 49 53" stroke="#0F1219" stroke-width="1.8" stroke-linecap="round" />
  <path d="M49 53L54 59" stroke="#0F1219" stroke-width="1.8" stroke-linecap="round" />
</svg>
